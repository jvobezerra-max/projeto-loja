<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="./src/css/estilo.css">
    <title>Projeto Loja</title>
</head>
<body>
    <header>
        <p class="logo">Loja<span>Patriota</span></p>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <div class="carrinho">
            <span id="carrinho-item">Items:0</span>
        </div>
    </header>
    <h1>Seja bem-vindo à loja personalizada do Capitão Pátria</h1>
    <main id="container">
        <h2>Produtos em Destaques</h2>
        <section class="card">
            <div class="card-patria">
                <img src="./src/assets/CapUniforme.avif" alt="Uniforme Capitão Pátria">
                <article class="card-content">
                    <h3>Uniforme Capitão Pátria</h3>
                    <p class="preco">R$ 4999,99</p>
                    <button class="btn-comprar">Comprar</button>
                    
                </article>

            </div>

                   <div class="card-patria">
                <img src="./src/assets/funko patria.jpg" alt="Funko pop Capitão Pátria">
                <article class="card-content">
                    <h3>Funko pop Capitão Pátria</h3>
                    <p class="preco">R$ 199,99</p>
                    <button class="btn-comprar">Comprar</button>
                    
                

            </div>

                   <div class="card-patria">
                <img src="./src/assets/Caneca pp.jpg" alt="Caneca do Capitão">
                <article class="card-content">
                    <h3>Caneca do Capitão</h3>
                    <p class="preco">R$ 55,90</p>
                    <button class="btn-comprar">Comprar</button>
                    
                

            </div>

                   <div class="card-patria">
                <img src="./src/assets/Mamadeira.jpg" alt="Mamadeira do Capitão">
                <article class="card-content">
                    <h3>Mamadeira do Capitão</h3>
                    <p class="preco">R$ 89,99</p>
                    <button class="btn-comprar">Comprar</button>
                    
                </article>

            </div>

        </section>



    </main>
    <footer>
        <p>&copy;-2026 Direitos Reservados</p>
    </footer>
    
</body>
</html>
